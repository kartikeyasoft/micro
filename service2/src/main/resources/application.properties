# Server Configuration
server.port=${SERVER_PORT:9002}

# Application Name
spring.application.name=${SPRING_APP_NAME:service2}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://172.21.12.151:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:Admin}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Eureka Configuration - FIXED
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Logging
logging.level.com.codingworld.service2=${LOG_LEVEL:INFO}