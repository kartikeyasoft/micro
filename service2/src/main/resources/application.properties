# Server Configuration
server.port=${SERVER_PORT:-9002}

# Application Name
spring.application.name=${SPRING_APP_NAME:-service2}

# Database Configuration
spring.datasource.url=${DB_URL:-jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:-Admin}
spring.datasource.password=${DB_PASSWORD:-Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:-http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}
eureka.instance.hostname=${spring.cloud.client.ip-address}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# Actuator endpoints (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.codingworld.service2=INFO
logging.level.org.hibernate.SQL=DEBUG