server:
  port: ${SERVER_PORT:9002}

spring:
  application:
    name: ${SPRING_APP_NAME:service2}
  datasource:
    url: ${DB_URL:jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:Admin}
    password: ${DB_PASSWORD:Admin@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true  # Added for better logging

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true  # Changed from ${EUREKA_PREFER_IP:true} to always true
    # No instance-id - let Eureka generate IP-based ID automatically

management:
  endpoints:
    web:
      exposure:
        include: health,info  # Added for health checks

logging:
  level:
    com.codingworld.service2: ${LOG_LEVEL:INFO}