server:
  port: ${SERVER_PORT:9002}

spring:
  application:
    name: ${SPRING_APP_NAME:service2}
  datasource:
    url: ${DB_URL:jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:Admin}
    password: ${DB_PASSWORD:Admin@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.codingworld.service2: ${LOG_LEVEL:INFO}