---
- name: Provision Service2 golden image
  hosts: all
  become: yes
  vars:
    app_user: "service2"
    app_name: "service2"
    app_version: "{{ lookup('env', 'SERVICE_VERSION') }}"
    nexus_url: "{{ lookup('env', 'NEXUS_URL') }}"
    service_port: "{{ lookup('env', 'SERVICE_PORT') | default('9002') }}"
    db_host: "{{ lookup('env', 'DB_HOST') }}"
    db_port: "{{ lookup('env', 'DB_PORT') | default('3306') }}"
    db_name: "{{ lookup('env', 'DB_NAME') }}"
    db_username: "{{ lookup('env', 'DB_USERNAME') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    eureka_port: "{{ lookup('env', 'EUREKA_PORT') | default('8761') }}"

  tasks:
    # - name: Update apt cache
    #   apt:
    #     update_cache: yes
    #     cache_valid_time: 3600

    # - name: Install OpenJDK 17
    #   apt:
    #     name: openjdk-17-jre-headless
    #     state: present
    #     update_cache: yes
    #     force: yes

    # - name: Install MySQL client for debugging
    #   apt:
    #     name: mysql-client
    #     state: present

    # - name: Install AWS CLI for Parameter Store access
    #   apt:
    #     name: awscli
    #     state: present

    - name: Create service2 user
      user:
        name: "{{ app_user }}"
        system: yes
        home: "/opt/{{ app_name }}"
        create_home: yes

    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create application.properties with environment variables support
      copy:
        content: |
          # Server Configuration
          server.port=${SERVER_PORT:-{{ service_port }}}
          
          # Application Name
          spring.application.name=${SPRING_APP_NAME:-{{ app_name }}}
          
          # Database Configuration
          spring.datasource.url=${DB_URL:-jdbc:mysql://{{ db_host }}:{{ db_port }}/{{ db_name }}?useSSL=false&serverTimezone=UTC}
          spring.datasource.username=${DB_USER:-{{ db_username }}}
          spring.datasource.password=${DB_PASSWORD:-{{ db_password }}}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          
          # HikariCP Connection Pool Settings
          spring.datasource.hikari.connection-timeout=60000
          spring.datasource.hikari.maximum-pool-size=10
          spring.datasource.hikari.minimum-idle=2
          
          # JPA Configuration
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=true
          spring.jpa.properties.hibernate.format_sql=true
          
          # File Upload Configuration
          spring.servlet.multipart.max-file-size=5MB
          spring.servlet.multipart.max-request-size=5MB
          
          # Eureka Configuration - Read from environment variable
          eureka.client.service-url.defaultZone=${EUREKA_URL:-http://localhost:{{ eureka_port }}/eureka/}
          eureka.instance.prefer-ip-address=true
          eureka.instance.lease-renewal-interval-in-seconds=30
          eureka.instance.lease-expiration-duration-in-seconds=90
          
          # Actuator endpoints (for health checks)
          management.endpoints.web.exposure.include=health,info
          management.endpoint.health.show-details=always
          
          # Logging
          logging.level.com.codingworld.service2=INFO
          logging.level.org.hibernate.SQL=DEBUG
        dest: "/opt/{{ app_name }}/application.properties"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Create environment file
      copy:
        content: |
          EUREKA_URL=http://localhost:{{ eureka_port }}/eureka/
          SERVER_PORT={{ service_port }}
          SPRING_APP_NAME={{ app_name }}
          DB_URL=jdbc:mysql://{{ db_host }}:{{ db_port }}/{{ db_name }}?useSSL=false&serverTimezone=UTC
          DB_USER={{ db_username }}
          DB_PASSWORD={{ db_password }}
        dest: "/opt/{{ app_name }}/{{ app_name }}.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Download Service2 JAR from Nexus
      get_url:
        url: "{{ nexus_url }}/com/ksapp/service2/{{ app_version }}/service2-{{ app_version }}.jar"
        dest: "/opt/{{ app_name }}/{{ app_name }}.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        timeout: 120
      retries: 5
      delay: 10
      register: download_result
      until: download_result is success

    - name: Verify JAR file was downloaded
      stat:
        path: "/opt/{{ app_name }}/{{ app_name }}.jar"
      register: jar_file

    - name: Fail if JAR not downloaded
      fail:
        msg: "JAR file was not downloaded successfully from Nexus"
      when: not jar_file.stat.exists or jar_file.stat.size == 0

    - name: Create systemd service file with environment file support
      copy:
        content: |
          [Unit]
          Description=Service2 - Quiz Application Backend
          After=network.target
          Wants=network.target
          
          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory=/opt/{{ app_name }}
          EnvironmentFile=-/opt/{{ app_name }}/{{ app_name }}.env
          ExecStart=/usr/bin/java -jar /opt/{{ app_name }}/{{ app_name }}.jar
          SuccessExitStatus=143
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          
          # Timeout settings for slow startup
          TimeoutStartSec=300
          TimeoutStopSec=120
          
          # Security settings
          NoNewPrivileges=true
          PrivateTmp=true
          
          [Install]
          WantedBy=multi-user.target
        dest: "/etc/systemd/system/{{ app_name }}.service"
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable service
      systemd:
        name: "{{ app_name }}"
        enabled: yes

    - name: Start service
      systemd:
        name: "{{ app_name }}"
        state: started

    - name: Debug - Check database username
      debug:
        msg: "DB Username is: {{ db_username }}"

    - name: Fail if DB username is null
      fail:
        msg: "DB_USERNAME is null! Please check Jenkins credentials."
      when: db_username == 'null' or db_username == ''

    - name: Clean up logs before AMI creation
      shell: |
        # Clear systemd journals
        journalctl --rotate
        journalctl --vacuum-time=1s
        rm -rf /var/log/journal/*
        
        # Clear system logs
        truncate -s 0 /var/log/syslog 2>/dev/null || true
        truncate -s 0 /var/log/auth.log 2>/dev/null || true
        truncate -s 0 /var/log/cloud-init.log 2>/dev/null || true
        truncate -s 0 /var/log/cloud-init-output.log 2>/dev/null || true
        
        # Clear bash history
        rm -f /root/.bash_history
        rm -f /home/ubuntu/.bash_history
        
        # Clear tmp files
        rm -rf /tmp/*
        rm -rf /var/tmp/*
        
        # Clear apt cache
        apt-get clean
        apt-get autoclean
      ignore_errors: yes
      args:
        warn: no

    - name: Display service status
      debug:
        msg: |
          ========================================
          Service2 Deployment Complete!
          ========================================
          Service Name: {{ app_name }}
          Service Port: {{ service_port }}
          Database Host: {{ db_host }}
          Eureka URL: Will be updated dynamically from SSM at boot
          ========================================