# Server Configuration
server.port=${SERVER_PORT:8080}

# Application Name
spring.application.name=${SPRING_APP_NAME:gateway}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:Admin}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (Optional but recommended)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Web Application Type (Required for Gateway)
spring.main.web-application-type=reactive

# Eureka Configuration (ADD THIS)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# Gateway Routes (Optional - can also be in code)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Logging
logging.level.org.springframework.cloud.gateway=${LOG_LEVEL_GATEWAY:INFO}
logging.level.reactor.netty.http.client=${LOG_LEVEL_NETTY:INFO}
logging.level.com.jwt_gateway=${LOG_LEVEL:INFO}

# Management/Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always