# Server Configuration
server.port=${SERVER_PORT:8080}

# Application Name
spring.application.name=${SPRING_APP_NAME:gateway}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://172.21.12.151:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:Admin}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Web Application Type
spring.main.web-application-type=reactive

# Logging
logging.level.org.springframework.cloud.gateway=${LOG_LEVEL_GATEWAY:INFO}
logging.level.reactor.netty.http.client=${LOG_LEVEL_NETTY:INFO}