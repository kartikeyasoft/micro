# Server Configuration
server.port=${SERVER_PORT:8080}

# Application Name
spring.application.name=${SPRING_APP_NAME:gateway}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:Admin}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.httpclient.connect-timeout=${GATEWAY_CONNECT_TIMEOUT:60000}
spring.cloud.gateway.httpclient.response-timeout=${GATEWAY_RESPONSE_TIMEOUT:90s}

# Gateway Routes
spring.cloud.gateway.routes[0].id=service1-route
spring.cloud.gateway.routes[0].uri=lb://service1
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/service1/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[1].id=service2-route
spring.cloud.gateway.routes[1].uri=lb://service2
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/service2/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers[0]=Authorization
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers[1]=Content-Type
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers[2]=Accept
spring.cloud.gateway.globalcors.cors-configurations[/**].allow-credentials=false

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}

# Logging
logging.level.com.jwt_gateway=${LOG_LEVEL:INFO}
logging.level.org.springframework.cloud.gateway=DEBUG

# Management
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always