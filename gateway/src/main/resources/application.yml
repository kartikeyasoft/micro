server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APP_NAME:gateway}
  
  datasource:
    url: ${DB_URL:jdbc:mysql://136.111.108.114:3306/exam?useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:Admin}
    password: ${DB_PASSWORD:Admin@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 10
      minimum-idle: 2
  
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      httpclient:
        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT:60000}
        response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:90s}
      routes:
        - id: service1-route
          uri: lb://service1
          predicates:
            - Path=/api/service1/**
          filters:
            - StripPrefix=2
        - id: service2-route
          uri: lb://service2
          predicates:
            - Path=/api/service2/**
          filters:
            - StripPrefix=2
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:*}
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["Authorization", "Content-Type", "Accept"]
            allowCredentials: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${server.port}

logging:
  level:
    com.jwt_gateway: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always