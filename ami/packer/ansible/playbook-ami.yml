---
- name: Provision AMI golden image
  hosts: all
  become: yes
  vars_files:
    - vars/ami.yml

  tasks:
    - name: Wait for cloud-init to complete
      command: cloud-init status --wait
      register: cloud_init_status
      until: cloud_init_status is success
      retries: 30
      delay: 10
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update
      until: apt_update is success
      retries: 3
      delay: 10

    - name: Install base packages
      apt:
        name: "{{ packages_base }}"
        state: present
        update_cache: yes
      register: base_install
      until: base_install is success
      retries: 3
      delay: 5

    - name: Install Java packages
      apt:
        name: "{{ packages_java }}"
        state: present
      register: java_install
      until: java_install is success
      retries: 3
      delay: 5

    - name: Install additional tools
      apt:
        name: "{{ packages_tools }}"
        state: present
      register: tools_install
      until: tools_install is success
      retries: 3
      delay: 5

    - name: Set JAVA_HOME environment variable
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: 'JAVA_HOME={{ java_home }}'
      when: java_version == "17"

    - name: Update PATH with Java
      lineinfile:
        path: /etc/environment
        regexp: '^PATH='
        line: 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ java_home }}/bin'

    - name: Verify Java installation
      command: java -version
      register: java_version_check
      changed_when: false
      failed_when: false

    - name: Display Java version
      debug:
        msg: "Java Version: {{ java_version_check.stderr | default('Not installed') }}"

    - name: Install AWS CLI v2
      block:
        - name: Download AWS CLI v2
          get_url:
            url: "{{ aws_cli_url }}"
            dest: /tmp/awscliv2.zip
            mode: '0644'
            timeout: 120
          register: aws_download

        - name: Extract AWS CLI installer
          unarchive:
            src: /tmp/awscliv2.zip
            dest: /tmp
            remote_src: yes
          when: aws_download.changed

        - name: Install AWS CLI v2
          shell: /tmp/aws/install --update
          args:
            creates: /usr/local/bin/aws
          when: aws_download.changed

        - name: Verify AWS CLI installation
          command: /usr/local/bin/aws --version
          register: aws_version_check
          changed_when: false

        - name: Display AWS CLI version
          debug:
            msg: "{{ aws_version_check.stdout }}"
      when: ansible_os_family == "Debian"

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/application
        - /var/log/application
        - /opt/scripts

    - name: Create health check script
      copy:
        dest: /opt/scripts/health-check.sh
        mode: '0755'
        content: |
          #!/bin/bash
          echo "Health check passed for {{ service_name }} on $(date)"
          exit 0

    - name: Verify all installations
      command: "{{ item }}"
      register: verify_results
      changed_when: false
      ignore_errors: yes
      loop:
        - aws --version
        - java -version
        - jq --version
        - unzip -v
        - curl --version
        - wget --version
      tags: verify

    - name: Display verification results
      debug:
        msg: |
          ==========================================
          INSTALLED PACKAGES VERIFICATION
          ==========================================
          {% for result in verify_results.results %}
          {{ result.cmd | join(' ') }}: {{ result.stdout | default(result.stderr) | truncate(200) }}
          {% endfor %}
          ==========================================

    - name: Cleanup section
      block:
        - name: Clean up apt cache
          apt:
            autoclean: yes
            autoremove: yes
          when: cleanup_enabled

        - name: Remove unnecessary packages
          apt:
            name: "{{ packages_to_remove }}"
            state: absent
            purge: yes
          when: cleanup_enabled
          ignore_errors: yes

        - name: Clear system logs
          shell: |
            find /var/log -type f -name "*.log" -exec truncate -s 0 {} \;
            journalctl --rotate
            journalctl --vacuum-time=1s
          when: cleanup_enabled and cleanup_logs
          ignore_errors: yes

        - name: Remove temporary files
          shell: |
            rm -rf /tmp/*
            rm -rf /var/tmp/*
            rm -rf /root/.cache
            find /home -name ".cache" -type d -exec rm -rf {} + 2>/dev/null || true
          when: cleanup_enabled and cleanup_temp
          ignore_errors: yes

        - name: Remove machine-id (will be regenerated on boot)
          file:
            path: /etc/machine-id
            state: absent
          when: cleanup_enabled

        - name: Clear bash history
          shell: |
            history -c
            rm -f /root/.bash_history
            rm -f /home/*/.bash_history
          when: cleanup_enabled
          ignore_errors: yes

        - name: Zero out disk space for better compression
          shell: dd if=/dev/zero of=/EMPTY bs=1M || rm -f /EMPTY
          when: cleanup_enabled and zero_disk
          ignore_errors: yes

  post_tasks:
    - name: Display build summary
      debug:
        msg: |
          ==========================================
          AMI BUILD SUMMARY
          ==========================================
          Service: {{ service_name }}
          Java Version: {{ java_version }}
          AWS CLI Version: {{ aws_cli_version }}
          Cleanup Performed: {{ cleanup_enabled }}
          Build Date: {{ ansible_date_time.date }}
          ==========================================