---
- name: Provision AMI golden image
  hosts: all
  become: yes
  vars_files:
    - vars/ami.yml

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update
      until: apt_update is success
      retries: 3
      delay: 10
      tags: [always]

    - name: Install base packages
      apt:
        name: "{{ packages_base }}"
        state: present
        update_cache: yes
      register: base_install
      until: base_install is success
      retries: 3
      delay: 5
      tags: [packages, base]

    - name: Add deadsnakes PPA for Python (Ubuntu 20.04 and older)
      apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present
      when: ansible_distribution_version is version('20.04', '<=')
      tags: [python, ppa]

    - name: Install Python {{ python_version }}
      apt:
        name: "python{{ python_version }}"
        state: present
      when: ansible_distribution_version is version('20.04', '<=')
      tags: [python]

    - name: Install Java packages
      apt:
        name: "{{ packages_java }}"
        state: present
        update_cache: yes
      register: java_install
      until: java_install is success
      retries: 3
      delay: 5
      tags: [java]

    - name: Install additional tools
      apt:
        name: "{{ packages_tools }}"
        state: present
      tags: [tools]

    - name: Set JAVA_HOME environment variable
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: 'JAVA_HOME={{ java_home }}'
      tags: [java, config]

    - name: Update PATH with Java
      lineinfile:
        path: /etc/environment
        regexp: '^PATH='
        line: 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ java_home }}/bin'
      tags: [java, config]

    - name: Verify Java installation
      command: java -version
      register: java_version_check
      changed_when: false
      failed_when: false
      tags: [java, verify]

    - name: Display Java version
      debug:
        msg: "Java Version: {{ java_version_check.stderr | default('Unknown') }}"
      tags: [java, verify]

    - name: Install AWS CLI v2
      block:
        - name: Download AWS CLI v2 installer
          get_url:
            url: "{{ aws_cli_url }}"
            dest: /tmp/awscliv2.zip
            mode: '0644'
            timeout: 120
          register: aws_download
          tags: [aws, download]

        - name: Install unzip if needed
          apt:
            name: unzip
            state: present
          when: aws_download.changed
          tags: [aws, unzip]

        - name: Extract AWS CLI installer
          unarchive:
            src: /tmp/awscliv2.zip
            dest: /tmp
            remote_src: yes
          when: aws_download.changed
          tags: [aws, extract]

        - name: Install AWS CLI v2
          command: /tmp/aws/install --update
          args:
            creates: /usr/local/bin/aws
          when: aws_download.changed
          tags: [aws, install]

        - name: Verify AWS CLI installation
          command: /usr/local/bin/aws --version
          register: aws_version_check
          changed_when: false
          tags: [aws, verify]

        - name: Display AWS CLI version
          debug:
            msg: "{{ aws_version_check.stdout }}"
          tags: [aws, verify]
      when: ansible_os_family == "Debian"
      tags: [aws]
   
    - name: Clean up apt cache
      apt:
        autoclean: yes
        autoremove: yes
      when: cleanup_enabled
      tags: [cleanup]

    - name: Remove unnecessary packages
      apt:
        name: "{{ packages_to_remove }}"
        state: absent
        purge: yes
      when: cleanup_enabled
      ignore_errors: yes
      tags: [cleanup]

    - name: Clear system logs
      shell: |
        find /var/log -type f -name "*.log" -exec truncate -s 0 {} \;
        journalctl --rotate
        journalctl --vacuum-time=1s
      when: cleanup_enabled and cleanup_logs
      ignore_errors: yes
      tags: [cleanup, logs]

    - name: Remove temporary files
      shell: |
        rm -rf /tmp/*
        rm -rf /var/tmp/*
        rm -rf /root/.cache
        find /home -name ".cache" -type d -exec rm -rf {} + 2>/dev/null || true
      when: cleanup_enabled and cleanup_temp
      ignore_errors: yes
      tags: [cleanup, temp]

    - name: Remove apt lists
      shell: rm -rf /var/lib/apt/lists/*
      when: cleanup_enabled
      ignore_errors: yes
      tags: [cleanup]

    - name: Remove SSH host keys (will be regenerated on boot)
      shell: rm -f /etc/ssh/ssh_host_*
      when: cleanup_enabled
      ignore_errors: yes
      tags: [cleanup, security]

    - name: Zero out disk space for better compression
      shell: dd if=/dev/zero of=/EMPTY bs=1M || rm -f /EMPTY
      when: cleanup_enabled and zero_disk
      ignore_errors: yes
      tags: [cleanup, compress]

    - name: Remove machine-id (will be regenerated on boot)
      file:
        path: /etc/machine-id
        state: absent
      when: cleanup_enabled
      tags: [cleanup]

    - name: Clear bash history
      shell: |
        history -c
        rm -f /root/.bash_history
        rm -f /home/*/.bash_history
      when: cleanup_enabled
      ignore_errors: yes
      tags: [cleanup]

  handlers:
    - name: restart services
      systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: yes
      loop: "{{ services_to_restart | default([]) }}"
      tags: [handlers]

    - name: reload sysctl
      command: sysctl --system
      tags: [handlers]

  post_tasks:
    - name: Display build summary
      debug:
        msg: |
          ====================================
          AMI Build Summary
          ====================================
          Service: {{ service_name }}
          Java Version: {{ java_version }}
          Python Version: {{ python_version }}
          App User: {{ app_user }}
          AWS CLI Version: {{ aws_cli_version }}
          Cleanup Performed: {{ cleanup_enabled }}
          ====================================
      tags: [summary]