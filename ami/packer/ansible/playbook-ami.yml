---
- name: Provision AMI golden image
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600


    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - wget
          - gnupg
          - lsb-release
        state: present

    - name: Add deadsnakes PPA for Python (if needed)
      apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present

    - name: Install Java 17
      apt:
        name: openjdk-17-jre-headless
        state: present
        update_cache: yes
        force: yes

    - name: Verify Java installation
      command: java -version
      register: java_version
      changed_when: false

    - name: Display Java version
      debug:
        msg: "{{ java_version.stderr }}"       

    - name: Install MySQL client for debugging
      apt:
        name: mysql-client
        state: present

    - name: Install AWS CLI for Parameter Store access
      apt:
        name: awscli
        state: present