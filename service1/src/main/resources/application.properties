# Server Configuration
server.port=${SERVER_PORT:9001}

# Application Name
spring.application.name=${SPRING_APP_NAME:service1}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://172.21.12.151:3306/exam?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:Admin}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}

# Logging
logging.level.com.codingworld.service1=${LOG_LEVEL:INFO}
