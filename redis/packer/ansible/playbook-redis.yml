---
- name: Provision Redis golden image
  hosts: all
  become: yes
  vars:
    app_user: "redis"
    app_name: "{{ lookup('env', 'SERVICE_NAME') }}"
    app_version: "{{ lookup('env', 'SERVICE_VERSION') }}"
    nexus_url: "{{ lookup('env', 'NEXUS_URL') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install OpenJDK 17
      apt:
        name: openjdk-17-jre-headless
        state: present

    - name: Create redis user
      user:
        name: "{{ app_user }}"
        system: yes
        home: "/opt/{{ app_name }}"
        create_home: yes

    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create application.yml
      copy:
        content: |
          server:
            port: 1222
          
          spring:
            application:
              name: redis-service
            redis:
              host: ${REDIS_HOST:localhost}
              port: ${REDIS_PORT:6379}
          
          eureka:
            client:
              service-url:
                defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
            instance:
              prefer-ip-address: true
              instance-id: \${spring.cloud.client.ip-address}:\${server.port}
          
          management:
            endpoints:
              web:
                exposure:
                  include: health,info,metrics
        dest: "/opt/{{ app_name }}/application.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Download Redis JAR from Nexus
      get_url:
        url: "https://raw.githubusercontent.com/kartikeyasoft/test/refs/heads/master/redis-service-1.0.0.jar"
        dest: "/opt/{{ app_name }}/{{ app_name }}.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      retries: 3
      delay: 10

    - name: Create systemd service file
      copy:
        content: |
          [Unit]
          Description=Redis Cache Service
          After=network.target
          
          [Service]
          User={{ app_user }}
          WorkingDirectory=/opt/{{ app_name }}
          ExecStart=/usr/bin/java -jar /opt/{{ app_name }}/{{ app_name }}.jar --spring.config.location=file:/opt/{{ app_name }}/application.yml
          SuccessExitStatus=143
          Restart=always
          RestartSec=10
          
          [Install]
          WantedBy=multi-user.target
        dest: "/etc/systemd/system/{{ app_name }}.service"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start service
      systemd:
        name: "{{ app_name }}"
        enabled: yes
        state: started
