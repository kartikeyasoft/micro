---
- name: Provision RabbitMQ Backend golden image
  hosts: all
  become: yes
  vars:
    app_user: "rabbitmq"
    app_name: "rabbitmq-backend"
    app_version: "{{ lookup('env', 'SERVICE_VERSION') }}"
    nexus_url: "{{ lookup('env', 'NEXUS_URL') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install OpenJDK 17
      apt:
        name: openjdk-17-jre-headless
        state: present

    - name: Create rabbitmq user
      user:
        name: "{{ app_user }}"
        system: yes
        home: "/opt/{{ app_name }}"
        create_home: yes

    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create application.properties
      copy:
        content: |
          server.port=8001
          spring.application.name=rabbitmq-service
          
          spring.rabbitmq.host=\${RABBITMQ_HOST:localhost}
          spring.rabbitmq.port=\${RABBITMQ_PORT:5672}
          
          spring.redis.host=\${REDIS_HOST:localhost}
          spring.redis.port=\${REDIS_PORT:6379}
          
          redis.service.url=\${REDIS_SERVICE_URL:http://localhost:1222/redis}
          
          eureka.instance.hostname=\${EUREKA_HOST:localhost}
          eureka.client.service-url.defaultZone=\${EUREKA_URL:http://localhost:8761/eureka/}
          eureka.instance.prefer-ip-address=true
        dest: "/opt/{{ app_name }}/application.properties"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Download RabbitMQ JAR from Nexus
      get_url:
        url: "https://raw.githubusercontent.com/kartikeyasoft/test/refs/heads/master/rabbitmqdemo-1.0.0.jar"
        dest: "/opt/{{ app_name }}/{{ app_name }}.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
        timeout: 120
      retries: 3
      delay: 10

    - name: Create systemd service file
      copy:
        content: |
          [Unit]
          Description=RabbitMQ Backend Service
          After=network.target
          
          [Service]
          User={{ app_user }}
          WorkingDirectory=/opt/{{ app_name }}
          ExecStart=/usr/bin/java -jar /opt/{{ app_name }}/{{ app_name }}.jar
          SuccessExitStatus=143
          Restart=always
          RestartSec=10
          
          [Install]
          WantedBy=multi-user.target
        dest: "/etc/systemd/system/{{ app_name }}.service"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start service
      systemd:
        name: "{{ app_name }}"
        enabled: yes
        state: started
