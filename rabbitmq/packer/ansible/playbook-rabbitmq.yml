---
- name: Provision RabbitMQ golden image
  hosts: all
  become: yes
  vars:
    app_user: "rabbitmq"
    app_name: "rabbitmq"
    app_version: "{{ lookup('env', 'SERVICE_VERSION') }}"
    nexus_url: "{{ lookup('env', 'NEXUS_URL') }}"
    service_port: "{{ lookup('env', 'SERVICE_PORT') | default('8001') }}"
    eureka_port: "{{ lookup('env', 'EUREKA_PORT') | default('8761') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install OpenJDK 17
      apt:
        name: openjdk-17-jre-headless
        state: present
        update_cache: yes
        force: yes

    - name: Install RabbitMQ Server
      apt:
        name: rabbitmq-server
        state: present

    - name: Install AWS CLI for Parameter Store access
      apt:
        name: awscli
        state: present

    - name: Start and enable RabbitMQ
      systemd:
        name: rabbitmq-server
        state: started
        enabled: yes

    - name: Enable RabbitMQ management plugin
      command: rabbitmq-plugins enable rabbitmq_management
      register: result
      changed_when: "'enabled' in result.stdout"

    - name: Create rabbitmq user
      user:
        name: "{{ app_user }}"
        system: yes
        home: "/opt/{{ app_name }}"
        create_home: yes

    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create application.yml with environment variables support
      copy:
        content: |
          server:
            port: \${SERVER_PORT:-{{ service_port }}}
          
          spring:
            application:
              name: \${SPRING_APP_NAME:-{{ app_name }}}
            rabbitmq:
              host: \${RABBITMQ_HOST:localhost}
              port: \${RABBITMQ_PORT:5672}
              username: \${RABBITMQ_USERNAME:guest}
              password: \${RABBITMQ_PASSWORD:guest}
          
          eureka:
            client:
              service-url:
                defaultZone: \${EUREKA_URL:-http://localhost:{{ eureka_port }}/eureka/}
              fetch-registry: true
              register-with-eureka: true
            instance:
              prefer-ip-address: true
              instance-id: \${spring.cloud.client.ip-address}:\${server.port}
              hostname: \${spring.cloud.client.ip-address}
          
          redis:
            service:
              url: \${REDIS_SERVICE_URL:http://localhost:1222/redis}
          
          logging:
            level:
              com.ksapp.rabbitmq: INFO
          
          management:
            endpoints:
              web:
                exposure:
                  include: health,info
        dest: "/opt/{{ app_name }}/application.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Create environment file
      copy:
        content: |
          EUREKA_URL=http://localhost:{{ eureka_port }}/eureka/
          SERVER_PORT={{ service_port }}
          SPRING_APP_NAME={{ app_name }}
          REDIS_SERVICE_URL=http://localhost:1222/redis
        dest: "/opt/{{ app_name }}/{{ app_name }}.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Download RabbitMQ JAR from Nexus
      get_url:
        url: "{{ nexus_url }}/com/ksapp/rabbitmq/{{ app_version }}/rabbitmq-{{ app_version }}.jar"
        dest: "/opt/{{ app_name }}/{{ app_name }}.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        timeout: 120
      retries: 5
      delay: 10
      register: download_result
      until: download_result is success

    - name: Verify JAR file was downloaded
      stat:
        path: "/opt/{{ app_name }}/{{ app_name }}.jar"
      register: jar_file

    - name: Fail if JAR not downloaded
      fail:
        msg: "JAR file was not downloaded successfully from Nexus"
      when: not jar_file.stat.exists or jar_file.stat.size == 0

    - name: Create systemd service file with environment file support
      copy:
        content: |
          [Unit]
          Description=RabbitMQ API Service
          After=network.target rabbitmq-server.service
          Wants=network.target
          
          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory=/opt/{{ app_name }}
          EnvironmentFile=-/opt/{{ app_name }}/{{ app_name }}.env
          ExecStart=/usr/bin/java -jar /opt/{{ app_name }}/{{ app_name }}.jar
          SuccessExitStatus=143
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          
          TimeoutStartSec=300
          TimeoutStopSec=120
          
          [Install]
          WantedBy=multi-user.target
        dest: "/etc/systemd/system/{{ app_name }}.service"
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable service
      systemd:
        name: "{{ app_name }}"
        enabled: yes

    - name: Start service
      systemd:
        name: "{{ app_name }}"
        state: started

    - name: Clean up logs before AMI creation
      shell: |
        journalctl --rotate
        journalctl --vacuum-time=1s
        rm -rf /var/log/journal/*
        truncate -s 0 /var/log/syslog 2>/dev/null || true
        truncate -s 0 /var/log/cloud-init.log 2>/dev/null || true
        truncate -s 0 /var/log/cloud-init-output.log 2>/dev/null || true
        rm -f /root/.bash_history
        rm -f /home/ubuntu/.bash_history
        rm -rf /tmp/*
        apt-get clean
      ignore_errors: yes
      args:
        warn: no

    - name: Display service status
      debug:
        msg: |
          ========================================
          RabbitMQ Deployment Complete!
          ========================================
          Service Name: {{ app_name }}
          Service Port: {{ service_port }}
          Eureka URL: Will be updated dynamically from SSM at boot
          Redis URL: Will be updated dynamically from SSM at boot
          ========================================