# Server Configuration
server.port=8001

# RabbitMQ Server Connection (where messages are sent/received)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

# Redis Service API (to store/retrieve data)
redis.service.url=${REDIS_SERVICE_URL:http://localhost:1222/redis}

# Eureka Service Discovery
eureka.instance.hostname=${EUREKA_HOST:localhost}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Logging
logging.level.com.example.rabbitmqdemo=INFO
