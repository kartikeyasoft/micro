# Server Configuration
server.port=${SERVER_PORT:8001}

# Application Name
spring.application.name=${SPRING_APP_NAME:rabbitmq-service}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Redis Configuration (direct connection)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Redis Service URL (for API calls)
redis.service.url=${REDIS_SERVICE_URL:http://localhost:1222/redis}

# Eureka Configuration
eureka.instance.appname=${spring.application.name}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.hostname=${EUREKA_HOST:localhost}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.registry-fetch-interval-seconds=${EUREKA_REGISTRY_FETCH_INTERVAL:5}

# Logging
logging.level.com.example.rabbitmqdemo=${LOG_LEVEL:INFO}
