# Server Configuration
server.port=${SERVER_PORT:8001}

# Application Name
spring.application.name=${SPRING_APP_NAME:rabbitmq}

# Eureka Configuration - Dynamic from environment
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}
eureka.instance.hostname=${spring.cloud.client.ip-address}

# Redis Configuration - Dynamic from environment
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.example.rabbitmqdemo=INFO