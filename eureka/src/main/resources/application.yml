server:
  port: 8761

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${server.port}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  cloud:
    inetutils:
      preferred-networks:
        - 172.31
